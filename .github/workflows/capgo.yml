name: Deploy to Capgo

on:
  push:
    branches:
      - main # O deploy vai acontecer sempre que você enviar código para a branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Capgo deploy
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
        run: |
          npm install -g @capgo/cli
          npx @capgo/cli upload -a $CAPGO_TOKEN -c com.app.intranet
